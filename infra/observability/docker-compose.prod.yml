services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${PHOENIX_POSTGRES_USER:-phoenix}
      POSTGRES_PASSWORD: ${PHOENIX_POSTGRES_PASSWORD:-phoenix_local_only}
      POSTGRES_DB: ${PHOENIX_POSTGRES_DB:-phoenix}
      PHOENIX_POSTGRES_GRAFANA_USER: ${PHOENIX_POSTGRES_GRAFANA_USER:-grafana_ro}
      PHOENIX_POSTGRES_GRAFANA_PASSWORD: ${PHOENIX_POSTGRES_GRAFANA_PASSWORD:-grafana_readonly_local_only}
    volumes:
      - muap_phoenix_postgres_data:/var/lib/postgresql/data
      - ./init/grafana_readonly.sql:/docker-entrypoint-initdb.d/10-grafana_readonly.sql:ro

  phoenix:
    image: arizephoenix/phoenix:version-17.2.0
    depends_on:
      - postgres
    ports:
      - "6006:6006"
      - "4317:4317"
      - "9090:9090"
    environment:
      PHOENIX_SQL_DATABASE_URL: postgresql://${PHOENIX_POSTGRES_USER:-phoenix}:${PHOENIX_POSTGRES_PASSWORD:-phoenix_local_only}@postgres:5432/${PHOENIX_POSTGRES_DB:-phoenix}
      PHOENIX_ENABLE_PROMETHEUS: "true"
      PHOENIX_DEFAULT_RETENTION_POLICY_DAYS: "7"
      PHOENIX_ALLOW_EXTERNAL_RESOURCES: "false"
      PHOENIX_TELEMETRY_ENABLED: "false"
      PHOENIX_ALLOWED_PROVIDERS: "NONE"
      PHOENIX_AGENTS_DISABLE_WEB_ACCESS: "true"

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.72.5.dev1
    depends_on:
      - phoenix
    ports:
      - "${LITELLM_HOST_PORT:-4000}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-local-only}
      LITELLM_LOG_LEVEL: INFO
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006
      ARIZE_PHOENIX_OTLP_PORT: "6006"
    volumes:
      - ../litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, sys, urllib.request; req = urllib.request.Request('http://localhost:4000/v1/models', headers={'Authorization': f\"Bearer {os.environ.get('LITELLM_MASTER_KEY', 'sk-litellm-local-only')}\"}); urllib.request.urlopen(req, timeout=5); sys.exit(0)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:11.0.0
    depends_on:
      - postgres
      - phoenix
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-frontlane-local-observability}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      PHOENIX_POSTGRES_GRAFANA_USER: ${PHOENIX_POSTGRES_GRAFANA_USER:-grafana_ro}
      PHOENIX_POSTGRES_GRAFANA_PASSWORD: ${PHOENIX_POSTGRES_GRAFANA_PASSWORD:-grafana_readonly_local_only}
      PHOENIX_POSTGRES_DB: ${PHOENIX_POSTGRES_DB:-phoenix}
    volumes:
      - muap_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  muap_phoenix_postgres_data:
  muap_grafana_data:
